    format: raster
    width: 60%
    caption: "Figure 12: 복잡한 시뮬레이션 시나리오. 애니메이션된 캐릭터와 기하학적으로 복잡한 게임 레벨에서의 천 시뮬레이션."
  - type: separator
  - type: heading
    level: 2
    text: 6. 결론
  - type: paragraph
    text: 일반적인 제약 함수를 통해 공식화된 일반 제약 조건을 처리할 수 있는 위치 기반 동역학 프레임워크를 제시하였습니다. 위치 기반 접근법을 통해 시뮬레이션 중에 물체를 직접 조작할 수 있습니다. 이는 충돌, 부착 제약 조건, 명시적 적분의 처리를 크게 단순화하며 애니메이션된 장면의 직접적이고 즉각적인 제어를 가능하게 합니다.
  - type: paragraph
    text: 이 프레임워크 위에 견고한 천 시뮬레이터를 구현하였으며, 이는 천과 강체의 양방향 상호작용, 천의 자기 충돌 및 응답, 동적 강체에 대한 천 조각의 부착과 같은 기능을 제공합니다.
  - type: heading
    level: 2
    text: 7. 향후 연구
  - type: paragraph
    text: 본 논문에서 다루지 않은 주제는 강체 시뮬레이션입니다. 그러나 본 논문에서 제시한 접근법은 강체 물체를 처리하도록 상당히 쉽게 확장할 수 있습니다. 일반적인 강체 솔버가 충돌 해소를 위해 선형 및 각 충격량 집합을 계산하는 대신, 접촉점에서 물체에 이동과 회전을 적용하고 솔버가 완료된 후 선형 및 각속도를 그에 따라 조정하면 됩니다.

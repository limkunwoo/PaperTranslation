  - type: heading
    level: 2
    text: "Appendix A:"
  - type: heading
    level: 3
    text: 정규화된 외적의 그래디언트
  - type: paragraph
    text: "제약 함수는 종종 정규화된 외적을 포함합니다. 투영 보정을 유도하기 위해서는 제약 함수의 그래디언트가 필요합니다. 따라서 두 인수에 대한 정규화된 외적의 그래디언트를 아는 것이 유용합니다. 정규화된 외적 $\\mathbf{n} = (\\mathbf{p}_1 \\times \\mathbf{p}_2) / |\\mathbf{p}_1 \\times \\mathbf{p}_2|$이 주어졌을 때, 첫 번째 벡터에 대한 도함수는 다음과 같습니다:"
  - type: equation
    latex: "\\frac{\\partial \\mathbf{n}}{\\partial \\mathbf{p}_1} = \\begin{pmatrix} \\frac{\\partial n_x}{\\partial p_{1 x}} & \\frac{\\partial n_x}{\\partial p_{1 y}} & \\frac{\\partial n_x}{\\partial p_{1 z}} \\\\ \\frac{\\partial n_y}{\\partial p_{1 x}} & \\frac{\\partial n_y}{\\partial p_{1 y}} & \\frac{\\partial n_y}{\\partial p_{1 z}} \\\\ \\frac{\\partial n_z}{\\partial p_{1 x}} & \\frac{\\partial n_z}{\\partial p_{1 y}} & \\frac{\\partial n_z}{\\partial p_{1 z}}\\end{pmatrix}"
    number: 16
  - type: equation
    latex: "= \\frac{1}{|\\mathbf{p}_1 \\times \\mathbf{p}_2|} (\\begin{pmatrix} 0 & p_{2 z} & -p_{2 y} \\\\ -p_{2 z} & 0 & p_{2 x} \\\\ p_{2 y} & -p_{2 x} & 0\\end{pmatrix} + \\mathbf{n}(\\mathbf{n} \\times \\mathbf{p}_2)^T)"
    number: 17
  - type: paragraph
    text: "축약하면, 두 인수에 대해 다음과 같습니다:"
  - type: equation
    latex: \frac{\partial \mathbf{n}}{\partial \mathbf{p}_1} = \frac{1}{|\mathbf{p}_1 \times \mathbf{p}_2|} (-\tilde{\mathbf{p}}_2 + \mathbf{n}(\mathbf{n} \times \mathbf{p}_2)^T)
    number: 18
  - type: equation
    latex: \frac{\partial \mathbf{n}}{\partial \mathbf{p}_2} = \frac{1}{|\mathbf{p}_1 \times \mathbf{p}_2|} (\tilde{\mathbf{p}}_1 + \mathbf{n}(\mathbf{n} \times \mathbf{p}_1)^T)
    number: 19
  - type: paragraph
    text: 여기서 $\tilde{\mathbf{p}}$는 $\tilde{\mathbf{p}} \mathbf{x} = \mathbf{p} \times \mathbf{x}$ 성질을 갖는 행렬입니다.
  - type: heading
    level: 3
    text: 굽힘 제약 조건 투영
  - type: paragraph
    text: "굽힘의 제약 함수는 $C = \\arccos(d) - \\varphi_0$이며, 여기서 $d = \\mathbf{n}_1^T \\cdot \\mathbf{n}_2 = \\mathbf{n}_1^T \\mathbf{n}_2$입니다. 일반성을 잃지 않고 $\\mathbf{p}_1 = \\mathbf{0}$으로 설정하면 법선 $\\mathbf{n}_1 = (\\mathbf{p}_2 \\times \\mathbf{p}_3) / |\\mathbf{p}_2 \\times \\mathbf{p}_3|$와 $\\mathbf{n}_2 = (\\mathbf{p}_2 \\times \\mathbf{p}_4) / |\\mathbf{p}_2 \\times \\mathbf{p}_4|$를 얻습니다. $\\mathrm{d} / (\\mathrm{d} x) \\arccos(x) = -1 / \\sqrt{1 - x^2}$이므로 다음 그래디언트를 얻습니다:"
  - type: equation
    latex: \nabla_{\mathbf{p}_3} C = -\frac{1}{\sqrt{1 - d^2}} (\frac{\partial \mathbf{n}_1}{\partial \mathbf{p}_3})^T (\mathbf{n}_2)
    number: 21
  - type: equation
    latex: \nabla_{\mathbf{p}_4} C = -\frac{1}{\sqrt{1 - d^2}} (\frac{\partial \mathbf{n}_2}{\partial \mathbf{p}_4})^T (\mathbf{n}_1)
    number: 22
  - type: equation
    latex: \nabla_{\mathbf{p}_2} C = -\frac{1}{\sqrt{1 - d^2}} ((\frac{\partial \mathbf{n}_1}{\partial \mathbf{p}_2})^T \mathbf{n}_2 + (\frac{\partial \mathbf{n}_2}{\partial \mathbf{p}_2})^T \mathbf{n}_1)
    number: 23
  - type: equation
    latex: \nabla_{\mathbf{p}_1} C = -\nabla_{\mathbf{p}_2} C - \nabla_{\mathbf{p}_3} C - \nabla_{\mathbf{p}_4} C
    number: 24
  - type: paragraph
    text: "정규화된 외적의 그래디언트를 사용하여 먼저 다음을 계산합니다:"
  - type: equation
    latex: \mathbf{q}_3 = \frac{\mathbf{p}_2 \times \mathbf{n}_2 + (\mathbf{n}_1 \times \mathbf{p}_2) d}{|\mathbf{p}_2 \times \mathbf{p}_3|}
    number: 25
  - type: equation
    latex: \mathbf{q}_4 = \frac{\mathbf{p}_2 \times \mathbf{n}_1 + (\mathbf{n}_2 \times \mathbf{p}_2) d}{|\mathbf{p}_2 \times \mathbf{p}_4|}
    number: 26
  - type: equation
    latex: \mathbf{q}_2 = -\frac{\mathbf{p}_3 \times \mathbf{n}_2 + (\mathbf{n}_1 \times \mathbf{p}_3) d}{|\mathbf{p}_2 \times \mathbf{p}_3|} - \frac{\mathbf{p}_4 \times \mathbf{n}_1 + (\mathbf{n}_2 \times \mathbf{p}_4) d}{|\mathbf{p}_2 \times \mathbf{p}_4|}
    number: 27
  - type: equation
    latex: \mathbf{q}_1 = -\mathbf{q}_2 - \mathbf{q}_3 - \mathbf{q}_4
    number: 28
  - type: paragraph
    text: "그러면 최종 보정은 다음과 같습니다:"
  - type: equation
    latex: \Delta \mathbf{p}_i = -\frac{w_i \sqrt{1 - d^2} (\arccos(d) - \varphi_0)}{\sum_j w_j |\mathbf{q}_j|^2} \mathbf{q}_i
    number: 29
  - type: separator

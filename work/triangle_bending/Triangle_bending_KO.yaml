metadata:
  title: "Position-Based Dynamics를 위한 삼각형 굽힘 제약 모델"
  authors: "Micky Kelager, Sarah Niebe, Kenny Erleben"
  affiliation: "eScience Center, Department of Computer Science, University of Copenhagen, Denmark"
  venue: "Workshop on Virtual Reality Interaction and Physical Simulation VRIPHYS (2010)"
  editors: "J. Bender, K. Erleben, and M. Teschner (Editors)"
  copyright: ""
  source_lang: "en"
  target_lang: "ko"

content:
  # ── Abstract ──
  - type: heading
    level: 2
    text: "초록"

  - type: paragraph
    indent: false
    text: |
      본 논문에서는 position-based dynamics를 위한 새로운 굽힘 모델과 제약 조건 생성 방법을 제시합니다. 새로운 굽힘 모델은 현재 최신 기술인 이면각(dihedral) 굽힘 모델의 대안으로 도입됩니다. 본 모델은 기하학적 원리에 기반하며 가상 삼각형(virtual triangle) 위에서 작동합니다. 스틱 제약 모델과 동일한 저렴한 계산 비용을 가지면서도, 이면각 굽힘 모델보다 높은 시뮬레이션 품질과 빠른 수렴 속도를 제공합니다.

      모델과 함께 새로운 전역 굽힘 파라미터가 도입되어, 기존의 강성 상수에 비해 높은 정밀도로 곡률 변형을 제어할 수 있습니다. 또한 삼각형 굽힘 모델에 적합하고 기저 메시 테셀레이션의 영향을 덜 받는 새로운 제약 조건 생성 방법을 제안합니다.

  - type: paragraph
    indent: false
    text: "**Categories and Subject Descriptors** (according to ACM CCS): Computer Graphics [I.3.5]: Physically based modeling — Computer Graphics [I.3.7]: Animation —"

  - type: paragraph
    indent: false
    text: "**Keywords:** Bending Constraint, Curvature, Interactive Simulation, Position-based Dynamics"

  - type: separator

  # ── 1. Introduction ──
  - type: heading
    level: 2
    text: "1. 서론"

  - type: paragraph
    text: |
      Position-based dynamics [MHHR06]는 인터랙티브 실시간 애플리케이션 [Jak01, Cou05, Cor10]의 산업 표준입니다. 위치만 유지하고 속도를 암묵적 양으로 처리하는 방식은, 접촉과 충돌을 단순한 투영으로 처리할 수 있다는 점에서 유리합니다. 이 패러다임은 보존 법칙 등을 고려하지 않고도 다양한 기하학적 제약 조건을 추가할 수 있어 상당한 범용성을 제공합니다.

      본 논문에서는 인터랙티브 시뮬레이션에서의 변형 가능 모델 문제를 다룹니다. 우리의 기여는 단순한 기하학적 원리에서 영감을 받은 새로운 굽힘 모델입니다. position-based dynamics의 경쟁 굽힘 모델들과 비교했을 때, 본 모델은 반응성을 개선하고 시뮬레이션 품질을 높이는 더 빠른 수렴 속도를 가집니다. 제안된 모델은 파라미터 값 선택에 덜 민감하며, 사용 편의성을 높일 것으로 기대합니다. 우리의 기여는 굽힘 모델의 등식(equality) 제약과 부등식(inequality) 제약 모두를 다룹니다.

  - type: figure_grid
    columns: 4
    items:
      - source: images/fig_5_page2.png
        label: "(a) Frame 1"
      - source: images/fig_6_page2.png
        label: "(b) Frame 79"
      - source: images/fig_7_page2.png
        label: "(c) Frame 248"
      - source: images/fig_8_page2.png
        label: "(d) Frame 686"
    caption: "Figure 1: position-based dynamics 패러다임과 삼각형 굽힘 제약 모델을 사용하여 시뮬레이션한 유사 식물(quasi plant). 프레임은 부록 동영상에서 캡처한 것입니다."

  - type: separator

  - type: figure_grid
    columns: 4
    items:
      - source: images/fig_9_page3.png
        label: "(a) $\\kappa = 0$"
      - source: images/fig_10_page3.png
        label: "(b) $\\kappa = 0.02$"
      - source: images/fig_11_page3.png
        label: "(c) $\\kappa = 0.1$"
      - source: images/fig_12_page3.png
        label: "(d) $\\kappa = 0.01$"
    caption: "Figure 2: 삼각형 굽힘 제약 모델은 빠른 반응과 높은 재현 품질을 제공합니다. 전역 파라미터 $\\kappa$를 증가시켜 Bunny의 붕괴를 제어하고, 다시 감소시켜 \"팽창\"시킵니다."

  - type: paragraph
    text: |
      최신 인터랙티브 물리 시뮬레이션은 선형 수렴 속도로 인해 감쇠된 탄성 응답과 낮은 재현 품질이라는 문제를 겪고 있습니다. 본 연구는 Figure 1과 2에서 보여주듯이 빠른 반응과 향상된 재현 품질을 제공합니다. 현재 최신 기술은 특정 상황에 국한되어 있으며 더 넓은 범위의 변형 거동을 지원하지 못합니다. 애니메이션 품질은 특정 테셀레이션에 크게 의존하고, 안정성은 제한적이며, 파라미터 값의 미세 조정이 어렵습니다. Figure 3은 강성 직물(rigid fabric) 시뮬레이션 결과를 보여주며 경쟁 굽힘 방법들의 몇 가지 문제점을 예시합니다.

  - type: paragraph
    text: |
      이러한 최신 기술의 문제점은 종종 게임 산업 등에서 테크니컬 아티스트의 필요성을 야기합니다. 본 논문에서는 더 안정적이고 더 넓은 범위의 거동을 허용하는 방법을 제안합니다. 우리의 새로운 방법이 모델러와 애니메이터에게 더 간편하게 사용될 수 있기를 기대합니다.

  - type: separator

  # ── 2. Related Work ──
  - type: heading
    level: 2
    text: "2. 굽힘 모델에 관한 관련 연구"

  - type: paragraph
    text: |
      컴퓨터 그래픽스에서 많은 연구가 굽힘 모델을 다루어 왔으며, 특히 천 시뮬레이션 분야에서 활발합니다. 여기서는 컴퓨터 그래픽스 커뮤니티에서의 주요 굽힘 모델 접근법에 대한 간략한 개요를 제시합니다.

  - type: paragraph
    text: |
      질량-스프링 모델은 천 시뮬레이션 [Pro95, BFA02]에 사용되어 왔으며 헤어 [SLF08] 등 다른 유형의 시뮬레이션으로 일반화되었습니다. 전통적으로 매 두 번째 노드에 연결된 스프링이 있는 정규 격자를 사용하여 굽힘에 저항합니다. 이러한 아이디어는 스틱 모델 [Jak01]에도 적용되었습니다.

      삼각형 메시에서 굽힘 모델을 생성하는 많은 변형이 존재합니다. 정규 격자의 원리를 삼각형 메시로 확장하여, 모서리를 공유하는 날개형 삼각형 쌍(winged triangle pair)의 꼭짓점 사이에 굽힘 연결을 추가합니다. [CK02]에서는 일정한 호 길이를 가진 원호를 이러한 굽힘 연결의 평형 형상으로 사용하였습니다. 이를 통해 천 좌굴(buckling)을 다루는 수치적으로 안정적인 방법이 가능해졌습니다.

      가상 노드는 [SLF08]에 의해 활용되어, 두 삼각형의 공유 모서리에 대한 굽힘 연결 위의 가상 노드로부터 보조 스프링을 생성하였습니다. [VMT06]에서 저자들은 날개형 삼각형 쌍의 국부 곡률을 평가하기 위해 높이 차이에 기반한 운동량 보존 굽힘 모델을 사용합니다. [THMG04]에서는 날개형 삼각형 쌍을 취하여 가상 사면체를 생성하고 여기에 체적 제약을 부착하여 굽힘을 추가하였습니다.

  - type: paragraph
    text: |
      모서리를 공유하는 두 삼각형 사이의 이면각에 기반한 굽힘 모델이 [BW98]에서 제시되었습니다. 동일한 모델이 position-based dynamics [MHHR06, MHHR07]에서 사용되었으며, 개선된 준다중격자(quasi-multi-grid) 솔버가 나중에 [M08]에서 제시되었습니다. 이면각에 기반한 새로운 개선된 굽힘 힘 모델이 [BMF03]에서 도입되었습니다. 여기서 저자들은 이면각의 변화만을 일으키는 변형 모드를 분석하고, 이 단일 모드를 삼각형 메시 크기로 가중된 계수를 사용하는 스프링 모델과 결합하였습니다. 설계상 이 모델은 운동량을 보존하며 이면각 굽힘에만 영향을 미칩니다. 관련 모델이 나중에 [PKST08]에서 이음새(seam) 모델링에 사용되었습니다.

  - type: paragraph
    text: |
      굽힘 에너지 범함수(functional)는 또 다른 패러다임에 속합니다. 여기서는 곡률 측정값의 적분이 모델의 수학적 기초 역할을 합니다. [VCMT95]에서는 곡률 평가 기법을 사용하여 관련 모멘트를 계산하고, 이를 삼각형 차원과 법선을 고려하여 힘으로 변환하였습니다. [EKS03]에서는 공회전 선형 탄성(co-rotational linear elasticity)을 사용하는 유한 요소 모델 접근법이 취해졌습니다. 여기서 굽힘 힘은 표면 법선 방향으로 투영된 Laplace 연산자를 사용하여 평가됩니다. 각 삼각형 요소에 대해 삼각형 꼭짓점에서의 표면 법선 투영의 평균이 사용됩니다.

      이산 곡률 에너지 계열이 [WBH*07]에서 제시되었습니다. 이러한 이산 곡률 측정의 한 응용은 [GHDS03]에서 발견됩니다. [Gri06]에서는 날개형 삼각형 쌍의 외접원 중심(circumcenter)을 사용하여 다이아몬드 형상의 영역을 정의하고, 그 안에서 평균 곡률 적분을 평가합니다. 이 접근법은 유한 체적법과 다소 유사합니다. 결과적인 굽힘 에너지 모델 [GHDS03, Gri06]은 이면각의 제곱에 공유 모서리의 길이를 곱하고 외접원 중심 사이의 직교 거리로 나눈 것입니다.

      최근에는 탄성 로드가 [BWR*08]과 [ST07, ST09]에서 다루어졌습니다. 여기서는 비틀림(twist)과 굽힘 모드가 모두 고려됩니다. 이러한 모델에서는 굽힘 에너지 범함수가 사용되며 유한 체적법과 유사한 이산화 기법이 적용됩니다. 우리가 아는 한, 이 연구는 인터랙티브 시뮬레이션에 사용된 바 없습니다.

  - type: paragraph
    text: |
      본 연구는 position-based dynamics에 기반합니다. 따라서 입자/질량-스프링 시스템에서 알려진 힘 기반 접근법은 적용되지 않으며, 굽힘 에너지 기반 접근법도 작동하지 않습니다. 인터랙티브 시뮬레이션에서의 산업 최신 굽힘 모델은 이면각에 기반합니다. 본 모델은 무게중심(centroid)과 삼각형 꼭짓점(tip) 사이의 거리 측정에 기반합니다.

  - type: figure_grid
    columns: 4
    items:
      - source: images/fig_13_page4.png
        label: "(a) 초기 프레임"
      - source: images/fig_14_page4.png
        label: "(b) 5 프레임 후"
      - source: images/fig_15_page4.png
        label: "(c) 17 프레임 후"
      - source: images/fig_16_page4.png
        label: "(d) 정지 상태"
    caption: "Figure 3: 강성 직물 시뮬레이션 메시 비교. 본 방법(왼쪽)과 최신 이면각 제약(중앙) 및 거리 스틱(오른쪽)을 비교합니다. 이 테스트는 다양한 굽힘 제약이 높은 위반 상태에서 얼마나 잘 회복하는지를 강조합니다. 모든 경우에 $k = 1$, $\\kappa = 0$이며 인장 제약에 탄성이 없습니다."

  - type: separator

  # ── 3. A Triangle Bending Constraint Model ──
  - type: heading
    level: 2
    text: "3. 삼각형 굽힘 제약 모델"

  - type: figure
    source: images/fig_17_page4.png
    format: raster
    width: 35%
    caption: "Figure 4: 삼각형 굽힘 제약은 곡률을 모델링하기 위해 최소 두 개의 삼각형에 걸쳐야 합니다."

  - type: paragraph
    text: |
      Position-based dynamics는 PhysX와 Bullet 같은 인터랙티브 시뮬레이션 소프트웨어의 현재 최신 기술이며, 다음의 굽힘 모델 [MHHR06]을 사용합니다.

  - type: equation
    latex: "C_{\\text{dihedral}}(\\mathbf{p}_1, \\mathbf{p}_2, \\mathbf{p}_3, \\mathbf{p}_4) = \\arccos(\\mathbf{n}_1 \\cdot \\mathbf{n}_2) - \\varphi_0"
    number: 1

  - type: paragraph
    text: |
      여기서 $\\varphi_0$는 초기 이면각이고, 단위 법선 $\\mathbf{n}_1$과 $\\mathbf{n}_2$는 다음과 같이 주어집니다.

  - type: equation
    latex: "\\mathbf{n}_1 = \\frac{(\\mathbf{p}_2 - \\mathbf{p}_1) \\times (\\mathbf{p}_3 - \\mathbf{p}_1)}{\\|(\\mathbf{p}_2 - \\mathbf{p}_1) \\times (\\mathbf{p}_3 - \\mathbf{p}_1)\\|}"
    number: 2
    suffix: "a"

  - type: equation
    latex: "\\mathbf{n}_2 = \\frac{(\\mathbf{p}_2 - \\mathbf{p}_1) \\times (\\mathbf{p}_4 - \\mathbf{p}_1)}{\\|(\\mathbf{p}_2 - \\mathbf{p}_1) \\times (\\mathbf{p}_4 - \\mathbf{p}_1)\\|}"
    number: 2
    suffix: "b"

  - type: paragraph
    text: |
      이 모델의 장점은 거리 또는 스틱 제약과 비교하여 신장(stretching)에 독립적이라는 것입니다. 본 모델은 신장에 준독립적(semi-independent)이며, 이는 평균적으로 인장 길이에 눈에 띄는 차이가 없음을 의미합니다. 식 (1)의 $\\arccos$ 항은 이면각 굽힘 모델에 문제를 일으키는데, $-1..1$ 범위(즉 $0..\\pi$ 라디안)에서만 잘 정의되기 때문입니다. 이는 평형 상태에서 변형 가능 물체의 완전한 국부 반사(reflection)가 또 다른 평형 상태를 만든다는 것을 의미합니다.

  - type: paragraph
    text: |
      Position-based dynamics로 작업할 때, 시뮬레이션 패러다임의 직관적인 성질 대부분이 기하학 자체에서 직접 비롯된다는 것을 인식하는 것이 중요합니다. 따라서 인장 제약은 모서리에서 구성되고, 이면각 굽힘 제약은 모서리를 공유하는 인접 삼각형 사이에서 생성됩니다. 강성 굽힘 제약은 메시 위상을 순회하여 연결되지 않은 매 두 번째 꼭짓점을 인장 제약 수단으로 연결함으로써 구성됩니다.

      본 모델은 위상에 직접적으로 의존하지 않으며, 삼각형 굽힘 제약은 "곡률"을 모델링하는 한 임의의 세 개의 고유 꼭짓점 사이에서 생성할 수 있습니다. 즉, 삼각형 메시의 경우 삼각형 굽힘 제약은 Figure 4에서 보여주듯이 최소 두 개의 삼각형에 걸쳐야 합니다. 퇴화 삼각형(degenerated triangle)은 삼각형 굽힘 제약에 유효한데, 이 경우 메시가 초기에 곡률이 없다는 것을 단순히 의미하기 때문입니다. 삼각형 굽힘 제약 생성을 위한 알고리즘은 Section 4.1에 자세히 설명합니다.

  - type: figure_grid
    columns: 2
    items:
      - source: images/fig_18_page5.png
        label: "(a) 삼각형 굽힘 모델 표기법"
      - source: images/fig_19_page5.png
        label: "(b) 삼각형 굽힘 모델 원리"
    caption: "Figure 5: 삼각형 굽힘 모델. (a) 세 중선의 교점이 무게중심 $c$입니다. 곡률 반경은 무게중심에서 삼각형 꼭짓점까지의 길이 $h$로 표현됩니다. 길이 차이를 이용하여 간단한 기하학적 제약을 공식화할 수 있습니다. (b) 꼭짓점이 중심 중선 방향을 따라 변위된 붕괴 상태의 삼각형."

  - type: paragraph
    text: |
      삼각형 굽힘 모델은 삼각형을 가능한 적은 수의 저렴한 연산으로, 가능한 적은 잠재 에너지를 도입하면서 어떻게 붕괴시킬 것인가에 대한 사고 실험에서 탄생합니다. 핵심 아이디어는 Figure 5(a)에 도시된 삼각형의 무게중심을 다루는 것입니다. 무게중심은 우리의 목적에 몇 가지 깔끔한 성질을 갖습니다. 세 중선은 정확히 무게중심에서 교차하며, 각 중선을 2:1의 비율로 분할합니다. 즉, $\|v - c\| = 2\|m_v - c\|$입니다. 선형 및 각운동량을 모두 보존하면서 삼각형을 붕괴시키기 위해 기저선(baseline) 꼭짓점 ($b_0$과 $b_1$)을 $\\frac{1}{2}(v - c)$만큼 변위시키고, Figure 5(b)에서 보여주듯이 $v = c$로 갱신합니다.

  - type: paragraph
    text: "본 방법의 기하학적 원리는 다음과 같이 주어지는 무게중심 $c$를 계산하는 것으로 설명할 수 있습니다."

  - type: equation
    latex: "\\mathbf{c} = \\frac{1}{3}(\\mathbf{b}_0 + \\mathbf{b}_1 + \\mathbf{v})"
    number: 3

  - type: paragraph
    text: "삼각형 꼭짓점 $v$와 무게중심 $c$ 사이의 거리에 다음과 같이 페널티를 부과합니다."

  - type: equation
    latex: "C_{\\text{triangle}}(\\mathbf{b}_0, \\mathbf{b}_1, \\mathbf{v}) \\geq \\|\\mathbf{v} - \\mathbf{c}\\| - (\\kappa + h_0)"
    number: 4

  - type: paragraph
    text: |
      여기서 $h_0$는 정지 길이(정지 곡률 반경)이고, $\\kappa$는 시스템의 전역 굽힘 파라미터입니다(아래에서 설명). 식 (4)의 표현은 부등식 제약 $C_{\\text{triangle}} \\geq 0$으로 정의되며, 이는 기저 모델이 정지 형상보다 더 휘어질 수 있게 합니다(예: 식물, 잎).

  - type: paragraph
    text: "대응하는 등식 굽힘 제약은 다음과 같이 정의됩니다."

  - type: equation
    latex: "C_{\\text{triangle}}(\\mathbf{b}_0, \\mathbf{b}_1, \\mathbf{v}) = \\|\\mathbf{v} - \\mathbf{c}\\| - h_0"
    number: 5

  - type: paragraph
    text: |
      여기서 암묵적으로 $\\kappa = 0$을 가정합니다. 전역 굽힘 파라미터 $\\kappa$를 식 (5)에서 사용하는 것이 제한되지는 않지만, 이 등식 제약은 원래 곡률에 충실하고자 하는 시스템(예: 직물)을 모델링하기 위한 것입니다. $\\kappa > 0$으로 설정하면, 기저 메시를 설계되지 않은 형상으로 강제할 수 있습니다.

  - type: paragraph
    text: |
      삼각형 굽힘 모델에서의 재료 거동은 사용자 정의 파라미터로 제어됩니다. 이러한 파라미터에는 평균 곡률 반경의 대략적 추정값으로 생각할 수 있는 전역 굽힘 상수 $\\kappa \\geq 0$과, 굽힘 제약의 강성을 제어하는 강성 상수 $0 \\leq k \\leq 1$이 포함됩니다. 우리는 위치 투영 보정에서 $k$를 직접 사용하지 않는데, 제약에 대해 둘 이상의 반복을 수행할 때 그 기여가 일반적으로 비선형이기 때문입니다. 대신 [MHHR06]에서 제안한 선형 의존 강성 상수를 사용합니다.

  - type: equation
    latex: "k' = 1 - (1-k)^{1/n}"
    number: 6

  - type: paragraph
    text: |
      여기서 $n$은 솔버 반복 횟수입니다. 본 모델은 이면각 모델과 동일한 결함으로, 모델의 대칭 반사를 구별하지 못합니다. 그러나 본 모델은 이면각 모델에서 대칭 반사로 인해 유발될 수 있는 인접 삼각형의 붕괴를 허용하지 않습니다. 굽힘 상수 $\\kappa$는 곡률을 명시적으로 제어하는 반면, 강성 상수 $k$는 암묵적으로 제어합니다. 두 파라미터를 모두 유지하는 이유는 크기가 현저히 다른 삼각형이 있는 메시를 지원하기 위해서입니다. $\\kappa$의 값은 절대적인 유클리드 거리인 반면, $k$는 백분율로 볼 수 있습니다.

  - type: separator

  # ── 4. A Fast Method for Interactive Applications ──
  - type: heading
    level: 2
    text: "4. 인터랙티브 애플리케이션을 위한 빠른 방법"

  - type: paragraph
    text: |
      본 굽힘 제약 모델을 기존 position-based dynamics 솔버에 구현하여, 천, 식물, 압력 연체(pressure soft body) 등 다양한 변형 가능 물체를 시뮬레이션할 수 있게 하였습니다. 삼각형 굽힘 모델이 등식 제약 (5)로 사용될 때, 매번 위치 투영을 수행합니다. 그러나 부등식 제약 (4)로 사용될 때는 제약을 평가하고, $C_{\\text{triangle}} < 0$인 경우에만 투영 보정을 수행합니다.

  - type: paragraph
    text: "다음에서 주어진 삼각형 굽힘 제약에 대해 세 꼭짓점 $b_0$, $b_1$, $v$의 위치 투영 보정을 수행하는 방법을 보여줍니다. 질량 $m > 0$인 주어진 꼭짓점의 역질량 $w$는 다음과 같습니다."

  - type: equation
    latex: "w = \\frac{1}{m}"
    number: 7

  - type: paragraph
    text: "여기서 $w = 0$은 무한 질량을 가진 고정(locked) 꼭짓점을 나타냅니다. 삼각형에 대한 일반화된 역질량을 다음과 같이 정의합니다."

  - type: equation
    latex: "W = w_{b_0} + w_{b_1} + 2w_v"
    number: 8

  - type: paragraph
    text: "임의 유형의 굽힘 제약이 위반되었을 때, 세 꼭짓점에 대한 위치 보정은 다음과 같습니다."

  - type: equation
    latex: "\\Delta \\mathbf{b}_0 = \\frac{2w_{b_0}}{W}(\\mathbf{v} - \\mathbf{c})\\left(1 - \\frac{\\kappa + h_0}{\\|\\mathbf{v} - \\mathbf{c}\\|}\\right)"
    number: 9
    suffix: "a"

  - type: equation
    latex: "\\Delta \\mathbf{b}_1 = \\frac{2w_{b_1}}{W}(\\mathbf{v} - \\mathbf{c})\\left(1 - \\frac{\\kappa + h_0}{\\|\\mathbf{v} - \\mathbf{c}\\|}\\right)"
    number: 9
    suffix: "b"

  - type: equation
    latex: "\\Delta \\mathbf{v} = -\\frac{4w_v}{W}(\\mathbf{v} - \\mathbf{c})\\left(1 - \\frac{\\kappa + h_0}{\\|\\mathbf{v} - \\mathbf{c}\\|}\\right)"
    number: 9
    suffix: "c"

  - type: paragraph
    text: |
      제약 평가는 식 (4)와 (5)의 양변을 제곱할 수 있고, 식 (9a), (9b), (9c)의 위치 투영은 차이 벡터의 길이를 계산하기 위한 단일 제곱근 평가만 필요하므로, 삼각형 굽힘 제약은 매우 효율적이고 빠르게 풀 수 있습니다. 이는 인터랙티브 환경의 애플리케이션에 이상적입니다.

  - type: separator

  # ── 4.1 Working with Triangle Meshes ──
  - type: heading
    level: 3
    text: "4.1. 삼각형 메시에서의 작업"

  - type: paragraph
    text: |
      삼각형 굽힘 제약을 임의의 삼각형 메시, 즉 개방 및 폐쇄 2-다양체(two manifold) 모두에 적용할 수 있습니다. 한 가지 접근법은 모든 모서리의 중점에 가상 꼭짓점을 추가하고, 모서리를 공유하는 두 쌍의 삼각형에 대해 삼각형 굽힘 제약을 생성하는 것입니다. 이면각 모델의 표기법을 사용하면 $b_0 = p_3$, $b_1 = p_4$, $v = (p_1 + p_2)/2$가 됩니다. 이는 삼각형 메시에 사용되는 전통적인 모서리 기반 굽힘 연결에 해당하며, 가상 꼭짓점의 투영이 두 모서리 꼭짓점에 분배됩니다.

      우리의 경험에 따르면 모서리 기반 접근법은 아래에서 설명할 우리가 선호하는 접근법보다 적은 수의 굽힘 제약을 생성합니다. 그러나 애니메이션 결과는 메시의 비대칭 위상으로 인해 문제가 생기므로, 삼각형 굽힘 제약 생성을 위한 다른 접근법을 선호합니다.

  - type: paragraph
    text: |
      우리는 임의의 2차원 삼각형 메시에서 잘 작동하는 알고리즘을 구성하였습니다. 이 알고리즘은 메시 위상에서 작동합니다. 메시의 각 꼭짓점 $v$에 대해 1-링 이웃 집합 $V$를 살펴봅니다. 각 이웃 꼭짓점 $v_i \in V$에 대해, 꼭짓점 $v$를 통해 가장 직선 방향에 있는 다른 매칭 꼭짓점 $v_j \neq v_i$를 이웃 집합에서 찾습니다. 각 꼭짓점에 고유 정수 인덱스 $\text{index}(v_i)$가 할당되어 있다고 가정하면, 알고리즘은 Figure 6에 나열된 의사코드로 스케치할 수 있습니다.

  - type: code
    title: "Algorithm — 굽힘 제약 조건 생성"
    text: |
      01:  algorithm create-bending-constraints(Mesh $M$)
      02:    foreach vertex $v$ in $M$ do
      03:      $V$ ← connected-vertices($v$, $M$)
      04:      foreach vertex $v_i$ in $V$ do
      05:        $\cos(\varphi_{\text{best}})$ ← 0
      06:        $v_{\text{best}}$ ← $v_i$
      07:        foreach vertex $v_j$ in $V$ do
      08:          $\cos(\varphi)$ ← $(v_i - v) \cdot (v_j - v) / (\|v_i - v\| \|v_j - v\|)$
      09:          if $\cos(\varphi) < \cos(\varphi_{\text{best}})$ then
      10:            $\cos(\varphi_{\text{best}})$ ← $\cos(\varphi)$
      11:            $v_{\text{best}}$ ← $v_j$
      12:          end if
      13:        end foreach
      14:        if $\text{cons}[\text{index}(v_{\text{best}})] \neq \text{index}(v_i)$ then
      15:          $\text{cons}[\text{index}(v_i)]$ ← $\text{index}(v_{\text{best}})$
      16:          create-bending-constraint($v_i$, $v_{\text{best}}$, $v$)
      17:        end if
      18:      end foreach
      19:    end foreach
      20:  end algorithm

  - type: paragraph
    indent: false
    text: "Figure 6: 삼각형 제약 생성 알고리즘을 보여주는 의사코드."

  - type: paragraph
    text: |
      03행에서 모서리를 통해 $v$에 연결된 모든 인접 꼭짓점을 반환하는 메서드가 존재한다고 가정합니다. 05행에서 $\varphi_{\text{best}}$를 0으로 초기화함으로써, $v$, $v_i$의 동일 반공간(half-space) 내에서는 삼각형 굽힘 제약이 생성되지 않도록 보장합니다. 14행의 검사는 생성된 모든 제약이 고유하도록 보장합니다. 변수 $\text{cons}$는 제약 연결을 기록하는 인덱스 맵입니다.

  - type: paragraph
    text: |
      삼각형 굽힘 제약이 메시 위상에 어떻게 할당되느냐에 따라, 다양한 재료 특성을 얻을 수 있다는 점에 주목해야 합니다. 이는 설계상 공유 삼각형 모서리에서만 생성될 수 있는 이면각 굽힘 제약과 다릅니다.

  - type: separator

  # ── 5. Experiments and Results ──
  - type: heading
    level: 2
    text: "5. 실험 및 결과"

  - type: paragraph
    text: |
      실험의 참조로서 최신 방법인 이면각 기반 굽힘 모델 [MHHR06]의 구현을 사용합니다. PhysX는 동일한 모델을 사용하며, 파라미터 값이나 과도한 속도, 힘 등의 클램핑과 같은 특정 안정성 조치가 적용되어 있습니다. 유사한 position-based dynamics가 Bullet 등의 다른 소프트웨어에서도 사용됩니다.

  - type: paragraph
    text: |
      본 섹션의 실험 및 측정은 2GHz Intel Core2 Duo CPU, 3GB 메모리, 32비트 Windows Vista에서 수행되었습니다. Table 1에서 보여주듯이, 삼각형 굽힘 모델은 이면각 굽힘 모델과 동등한 수준에서 인터랙티브 실시간 성능 요구를 충족합니다. 평균적으로 본 방법은 이면각 모델보다 3배 이상 빠릅니다.

  - type: table
    title: "Rigid Fabric Performance Times"
    headers: ["제약 유형", "제약 수", "평균 (ms)", "전체 (ms)"]
    rows:
      - ["Triangle", "160", "0.000158", "0.405987"]
      - ["Dihedral", "144", "0.000503", "1.159640"]
      - ["Stick", "160", "0.000113", "0.288305"]
    caption: "Table 1: 세 가지 굽힘 제약 유형 간의 단일 프레임 성능 측정 비교 (밀리초). 강성 직물 모델은 100개의 꼭짓점으로 구성됩니다. 세 경우 모두 16회의 솔버 반복을 사용합니다. 테스트 케이스는 Figure 3에 묘사되어 있습니다. 평균적으로 본 방법이 이면각 굽힘 방법보다 3배 빠른 것을 확인할 수 있습니다."

  - type: figure
    source: images/fig_20_page7.png
    format: raster
    width: 80%
    caption: "Figure 7: 삼각형 굽힘 모델이 이면각 기반 굽힘 모델과 비교하여 얼마나 빠르게 수렴하는지 보여주는 수렴 그래프. 두 경우 모두 Q-선형 수렴을 보이지만, 삼각형 방법의 수렴 속도가 더 낮은(즉, 더 빠른) 것을 확인할 수 있습니다."

  - type: paragraph
    text: |
      삼각형 굽힘 모델의 수렴 속도를 이면각 굽힘 모델과 비교하였으며, 수렴 그래프는 Figure 7에 나타나 있습니다. 제약 솔버에서 사용된 반복 횟수의 함수로 정규화된 상대 제약 오차를 도시하였습니다. 이 연구에서는 Figure 3 시뮬레이션의 전반부에서 무작위 프레임을 사용하였습니다. 수렴 그래프는 Q-선형 수렴과의 유사성을 나타냅니다. 이는 제약 투영 접근법이 본질적으로 최급강하법(steepest descent method)이라는 점에서 놀랍지 않습니다. 그러나 보여주듯이 본 방법은 더 낮은 수렴 속도를 가져 더 빠른 반응을 제공합니다. 이는 실시간 인터랙티브 시스템에서의 라이브 프레임 캡처를 보여주는 부록 비디오에서도 관찰할 수 있습니다.

  - type: paragraph
    text: |
      강성 직물을 광범위한 파라미터 값에 노출시키고 다양한 굽힘 거동을 비교하는 민감도 연구를 수행하였습니다. 결과에서 캡처한 프레임은 Figure 8에 묘사되어 있습니다. 결과는 도입된 파라미터 $\\kappa$가 position-based dynamics에서 일반적으로 사용되는 강성 상수 $k$에 비해 굽힘 특성에 대해 더 민감한 제어를 제공하는 것을 보여줍니다.

  - type: figure_grid
    columns: 3
    items:
      - source: images/fig_21_page7.png
        label: "(a) $\\kappa = 0.004$"
      - source: images/fig_22_page7.png
        label: "(b) $\\kappa = 0.01$"
      - source: images/fig_23_page7.png
        label: "(c) $\\kappa = 0.06$"
      - source: images/fig_24_page7.png
        label: "(d) $k = 1$"
      - source: images/fig_25_page7.png
        label: "(e) $k = 0.999$"
      - source: images/fig_26_page7.png
        label: "(f) $k = 0.8$"
    caption: "Figure 8: 다양한 파라미터 값의 시각적 비교. (a)-(c) 강성 파라미터 $k = 1$. (d)-(f) 곡률 파라미터 $\\kappa = 0$. $k$는 굽힘 특성에 제한된 제어를 제공하는 반면, $\\kappa$는 훨씬 높은 수준으로 굽힘 특성을 미세 조정할 수 있는 것을 확인할 수 있습니다."

  - type: figure
    source: images/fig_27_page7.png
    format: raster
    width: 80%
    caption: "Figure 9: 변형 가능 cow들은 동일한 메시와 삼각형 굽힘 제약을 사용하며, 모두 파라미터 $k = 1$, $\\kappa = 0$입니다. 제약은 등식으로 설정되었지만 솔버 반복 횟수가 다릅니다. 왼쪽 cow는 2회 반복만, 중간 cow는 16회, 오른쪽 cow는 64회 반복을 사용합니다."

  - type: paragraph
    text: |
      시연한 모든 복잡한 모델은 삼각형 굽힘 제약을 배치하기 위해 본 제약 생성 알고리즘을 사용합니다. 이러한 모델의 예로는 Figure 1의 아름다운 곡선을 보여주는 유사 식물, Figure 2의 Stanford Bunny 붕괴 및 팽창, 그리고 솔버 반복 횟수를 변화시켰을 때의 다양한 특성을 보여주는 Figure 9가 있습니다. 처음 두 그림은 부등식 삼각형 굽힘 제약을 사용하고, 마지막 그림은 등식 버전으로 변형 가능 셸(shell) 표면을 거의 강체에 가깝게 렌더링할 수 있음을 보여줍니다.

  - type: separator

  # ── 6. Discussion and Conclusion ──
  - type: heading
    level: 2
    text: "6. 논의 및 결론"

  - type: paragraph
    text: |
      본 논문에서는 변형 가능 모델의 인터랙티브 실시간 시뮬레이션을 위한 현재 최신 이면각 기반 굽힘 모델의 대안으로 새로운 기하학적 굽힘 모델을 제시하였습니다. 새로운 방법은 기하학적 원리로부터 개발되었으며 직관에 의해 안내되었습니다. 실험은 새로운 삼각형 굽힘 모델이 이면각 굽힘 모델보다 빠른 수렴 특성과 함께 최소한 동등한 시뮬레이션 및 애니메이션 품질을 가짐을 보여줍니다. 이는 우리의 견해로는 position-based dynamics와 그 응용에 대한 점진적이지만 실질적인 개선입니다.

  - type: paragraph
    text: |
      인터랙티브 설계 애플리케이션에서 변형 가능 물체를 더 적용하기 위해 해결해야 할 과제가 여전히 남아 있습니다. 우선, 굽힘 모델의 반전을 야기하는 대칭 반사를 발견하지 못하는 문제가 미해결입니다. 또한 예술적 관점에서 여전히 방법을 적용하기 위해 일정 수준의 기술적 세부사항을 알아야 합니다. 예를 들어, 메시 요소의 연결성이 필요하며, 본 방법이 테셀레이션의 영향을 덜 받는 것으로 보이지만 이에 대한 추가 연구가 필요합니다.

      물리 모델에서 제약을 생성할 목적으로 기하학적 구조를 전처리하는 것이 흥미로울 수 있다고 추측합니다. physics-based dynamics에서 충돌을 처리하는 현재 전략은 종종 유령 힘(ghost force)과 유사한 결과를 초래하며, 이는 우리의 굽힘 제약 모델에서도 문제입니다. 투영에 의한 더 강건한 충돌 처리 방법은 조사할 가치가 있습니다.

  - type: paragraph
    text: |
      가능한 개선 방향 중 하나는 표면의 대칭 반사를 다루기 위해 "부호 있는" 높이를 사용하는 것이라고 추측합니다. 가능한 아이디어는 제약 생성 시 삼각형 굽힘 제약에 의해 정의된 삼각형의 부호 있는 면적을 계산하는 것입니다. 시뮬레이션 중에 면적의 부호를 재계산하고, 초기 정지 부호와 다르면 제약 투영에 대한 특수 케이스를 적용할 수 있습니다. 이는 향후 연구로 남겨둡니다.

